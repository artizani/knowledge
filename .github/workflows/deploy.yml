name: Deploy

# Deploy only after CI has succeeded on main. This keeps deployments gated on
# the full test suite without duplicating it here.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write # required for AWS OIDC
  contents: read

jobs:
  deploy:
    name: CDK deploy
    runs-on: ubuntu-latest
    # For workflow_run: only proceed if CI concluded successfully.
    # For workflow_dispatch: event.workflow_run is null, so allow it through.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node.js (for the AWS CDK CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install AWS CDK CLI (matching aws-cdk-lib)
        run: npm install -g aws-cdk@2.190.0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r infra/requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: CDK deploy
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: cdk deploy --require-approval never
